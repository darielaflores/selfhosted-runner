name: Hybrid Pipeline

on:
  push:
    branches:
      - main

jobs:

  # Runner de GitHub
  hosted-job:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout
        uses: actions/checkout@v4

      - name: Hosted runner info
        run: |
          echo "Running on GitHub Hosted Runner"
          uname -a

  # Self runner
  self-hosted-job:

    runs-on:
      - self-hosted
      - windows
      - custom-runner

    steps:

      - name: Checkout
        uses: actions/checkout@v4

      - name: Show current user
        run: whoami

      - name: Show runner info
        run: |
          echo "Running on Self Hosted Runner"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Run tests
        run: npm test
